name: tests

# Lint + the full pytest suite (unit + Testcontainers integration) on every push and PR.
# Testcontainers starts throwaway Postgres + Redis inside the runner's own Docker daemon
# (preinstalled on ubuntu-latest), so no `services:` block is needed — the suite spins the
# containers itself exactly as it does locally.

# Runs on every push to `main` and on every pull request. Feature branches are covered
# through their PR (the `pull_request` trigger), so a direct push to a feature branch with
# no open PR intentionally does not spend CI minutes until it is proposed for merge.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install the project (editable services + dev tooling)
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/shared
          pip install -e services/api
          pip install -e services/redirect
          pip install -e services/worker
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest
