# Alembic configuration for the LinkShrink shared schema (Epic 2).
#
# The database URL is intentionally left blank here: migrations/env.py resolves it
# at runtime — either from an explicit `sqlalchemy.url` set on the Config object (the
# Testcontainers tests do this) or by building a postgresql+asyncpg URL from the
# POSTGRES_* env vars (the same vars in .env.example). Epic 5 may later route this
# through linkshrink_shared.config.
#
# Usage (from the repo root, with POSTGRES_* exported or a .env loaded):
#   alembic upgrade head
#   alembic downgrade base

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# Zero-padded, sortable revision filenames: 0001_initial_schema.py, 0002_...
file_template = %%(rev)s_%%(slug)s
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
