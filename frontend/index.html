<!doctype html>
<html lang="en" id="html-root">
  <head id="document-head">
    <meta charset="UTF-8" id="meta-charset" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" id="meta-viewport" />
    <meta name="color-scheme" content="dark" id="meta-color-scheme" />
    <meta
      name="description"
      content="LinkShrink: a fast, developer-focused URL shortener demo."
      id="meta-description"
    />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" id="favicon-link" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://link-shrink.com/" id="canonical-link" />

    <!-- Open Graph (LinkedIn, Facebook, Slack, etc.) -->
    <meta property="og:type" content="website" id="meta-og-type" />
    <meta property="og:site_name" content="LinkShrink" id="meta-og-site-name" />
    <meta property="og:url" content="https://link-shrink.com/" id="meta-og-url" />
    <meta property="og:title" content="LinkShrink" id="meta-og-title" />
    <meta
      property="og:description"
      content="LinkShrink: a fast, developer-focused URL shortener demo."
      id="meta-og-description"
    />
    <meta
      property="og:image"
      content="https://link-shrink.com/images/linkshrink.png"
      id="meta-og-image"
    />
    <meta property="og:image:width" content="1536" id="meta-og-image-width" />
    <meta property="og:image:height" content="1024" id="meta-og-image-height" />
    <meta property="og:image:alt" content="LinkShrink logo" id="meta-og-image-alt" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" id="meta-twitter-card" />
    <meta name="twitter:title" content="LinkShrink" id="meta-twitter-title" />
    <meta
      name="twitter:description"
      content="LinkShrink: a fast, developer-focused URL shortener demo."
      id="meta-twitter-description"
    />
    <meta
      name="twitter:image"
      content="https://link-shrink.com/images/linkshrink.png"
      id="meta-twitter-image"
    />

    <title id="document-title">LinkShrink</title>
  </head>
  <body id="document-body">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" id="app-entry-script"></script>
  </body>
</html>
