# LinkShrink — full stack (Epics 18a + 18b).
#
# Epic 18a brings up the backend half: Postgres, Redis, a one-shot migration
# step, and the three Python services (api, redirect, worker). Epic 18b adds the
# public edge: a one-shot frontend-build (compiles the SPA into a shared volume)
# and an nginx service doing TLS termination, real-IP recovery, the QR edge
# cache, and the §5.10 routing precedence — completing the full-system bring-up.
#
# Bring-up (from the repo root):
#   make up          # builds the base image first, then this stack
#   infra/up.ps1     # Windows equivalent
# All commands target this file via `-f infra/docker-compose.yml`.
#
# Service Dockerfiles `FROM linkshrink-base`, so that image must be built first
# (the Makefile / up.ps1 do this). Build context is the repo root (`..`) so the
# COPY paths in the Dockerfiles resolve.

name: linkshrink

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    # Postgres reads POSTGRES_USER/PASSWORD/DB from the env to provision the
    # role/database; the repo-root .env supplies them (same file the services use).
    env_file:
      - ../.env
    # Published to the host for local debugging (psql / GUI tools), bound to
    # loopback only so the database is never exposed on the LAN. The app services
    # below are NOT published — they are reachable only on the network.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - linkshrink

  redis:
    image: redis:7
    restart: unless-stopped
    # AOF persistence so the analytics stream / counters survive a restart.
    command: ["redis-server", "--appendonly", "yes"]
    # Published to the host for local debugging (redis-cli), bound to loopback
    # only — Redis has no password in local dev, so it must never be reachable off
    # this host. App services stay internal.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - linkshrink

  # One-shot schema migration. Runs `alembic upgrade head` and exits 0; the app
  # services wait on its successful completion, so nothing serves before the
  # schema exists.
  migrate:
    build:
      context: ..
      dockerfile: infra/docker/migrate.Dockerfile
    image: linkshrink-migrate
    restart: "no"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - linkshrink

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    image: linkshrink-api
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # No `ports:` — internal-only, reachable only through the proxy (Epic 18b).
    # slim base has no curl, so probe /health with a dependency-free python call.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).getcode()==200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - linkshrink

  redirect:
    build:
      context: ..
      dockerfile: infra/docker/redirect.Dockerfile
    image: linkshrink-redirect
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # No `ports:` — internal-only, reachable only through the proxy (Epic 18b).
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health', timeout=3).getcode()==200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - linkshrink

  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    image: linkshrink-worker
    restart: unless-stopped
    # WORKER_NUMBER (names this instance's consumer in the analytics group) comes
    # from the repo-root .env, so a second worker can be numbered without editing
    # this file. Defaults to 1 in linkshrink_worker.config if unset.
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # No HTTP surface — liveness is the heartbeat in Redis (≤ 15 s, §5.2).
    healthcheck:
      test: ["CMD", "python", "-m", "linkshrink_worker.healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - linkshrink

  # One-shot SPA build (Epic 18b, mirrors `migrate`). Runs the Vite production
  # build and publishes the static dist/ into the shared frontend-dist volume,
  # then exits 0. The nginx service waits on its successful completion.
  frontend-build:
    build:
      context: ..
      dockerfile: infra/docker/frontend-build.Dockerfile
    image: linkshrink-frontend-build
    restart: "no"
    volumes:
      - frontend-dist:/out
    networks:
      - linkshrink

  # Public edge proxy (Epic 18b): TLS termination, real-IP recovery, the QR edge
  # cache, and the §5.10 routing precedence. The only service published to the
  # host — the api/redirect services stay internal and are reached only through
  # here. PUBLIC_HOST (from .env) names the self-signed cert generated on first
  # boot when no cert is mounted (see infra/nginx/docker-entrypoint.sh).
  nginx:
    build:
      context: ..
      dockerfile: infra/docker/nginx.Dockerfile
    image: linkshrink-nginx
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Drop-in runs before nginx starts; generates the self-signed cert if absent.
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint.d/99-self-signed.sh:ro
      - frontend-dist:/usr/share/nginx/html:ro
      - nginx-certs:/etc/nginx/certs
      - nginx-cache:/var/cache/nginx
    depends_on:
      frontend-build:
        condition: service_completed_successfully
      api:
        condition: service_healthy
      redirect:
        condition: service_healthy
    # End-to-end probe: /health routes through to the API (block 2), so this
    # reports healthy only when nginx AND the API behind it are serving. busybox
    # wget; --no-check-certificate because the local cert is self-signed.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - linkshrink

volumes:
  postgres-data:
  redis-data:
  # Built SPA assets handed from frontend-build to nginx.
  frontend-dist:
  # Persisted TLS cert (self-signed locally, or a mounted prod cert).
  nginx-certs:
  # Backs the QR proxy_cache zone in nginx.conf.
  nginx-cache:

networks:
  linkshrink:
    driver: bridge
