# infra/nginx/conf.d/default.conf — Epic 18b routing + TLS (server-level).
#
# =============================================================================
# RESERVED-WORD ANTI-DRIFT CHECKLIST (§5.10) — KEEP IN SYNC
#
# Every literal path segment served by blocks 1-4 below MUST also appear in
# linkshrink_shared.validation.proxy_served_paths() — the source of truth the
# Epic 4 coverage test ranges over (it asserts proxy_served_paths() <=
# RESERVED_WORDS). Served segments and their helper entries:
#
#   block 1  /api/          -> "api"           (covered)
#   block 2  /health        -> "health"        (covered; routed to API, see note)
#            /api/metrics   -> "metrics"       (covered; lives under /api/)
#   block 3  /assets/       -> "assets"        (covered)
#            /images/       -> "images"        (covered; SPA public/ logos)
#            /static/       -> "static"        (covered; reserved for future use)
#            favicon.ico, robots.txt           (dotted -> intentionally NOT reserved)
#   block 4  /dashboard[/]  -> "dashboard"     (covered; incl. /dashboard/:code)
#            /how-it-works  -> "how-it-works"  (covered)
#            "/" root                          (not alias-collidable -> not reserved)
#
# If you ADD or RENAME a served path here, update proxy_served_paths() (and, if
# it is a new alias-collidable word, RESERVED_WORDS) in
# packages/shared/src/linkshrink_shared/validation.py, or the anti-drift test
# fails. Do NOT add dotted files or "/" to the helper — the alias grammar forbids
# "." and requires >=3 chars, so they can never be claimed as an alias.
#
# BLOCK 4 SPA-ROUTE COUPLING — KEEP IN SYNC with frontend/src/App.tsx <Route>s.
# The block-4 locations are an enumerated mirror of the SPA's top-level routes
# (currently "/", "/dashboard", "/dashboard/:code", "/how-it-works"). A frontend
# route that is NOT listed here falls through to the block-5 redirect catch-all
# and 404s on a hard refresh. When you add/rename a top-level route in App.tsx,
# add the matching =/^~ location below (and, if it introduces a new served
# segment, the proxy_served_paths() entry above).
#
# TLS: the cert paths below are environment-agnostic. The local self-signed pair
# is written by docker-entrypoint.sh only when absent. PROD: mount Let's Encrypt
# fullchain.pem/privkey.pem at the SAME paths (or run certbot into the
# nginx-certs volume) and this config is unchanged; reload with `nginx -s reload`
# after each renewal.
# =============================================================================

# :80 -> :443 — every plain-HTTP request is redirected to HTTPS.
server {
    listen      80;
    listen      [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

# :443 www -> apex — canonical redirect. This block has an explicit server_name,
# so it wins over the `server_name _;` default block below for www requests. TLS
# terminates here, so the cert MUST include www.link-shrink.org (see infra/cert.sh)
# — otherwise the handshake fails before this 301 is ever sent.
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name www.link-shrink.org;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://link-shrink.org$request_uri;
}

# :443 — the TLS edge that serves the SPA and routes everything (§5.10).
# Marked default_server so any host that is NOT the literal www.link-shrink.org
# (localhost healthcheck, the raw public IP, the apex domain) lands here rather
# than the www redirect block above — without this, the www block, being the
# first :443 server, becomes nginx's implicit default and 301s the /health probe.
server {
    listen      443 ssl default_server;
    listen      [::]:443 ssl default_server;
    http2       on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:5m;

    # The built SPA (frontend-dist volume, mounted read-only).
    root  /usr/share/nginx/html;
    index index.html;

    # === BLOCK 1: /api/* -> API, with the QR edge cache (Epic 9) =============
    # ^~ gives /api/links/ prefix-priority over the generic `location /api/`
    # below and skips regex matching. The nested regex applies the cache to ONLY
    # the .../qr subpath; every other /api/links/* request proxies uncached.
    # proxy_cache_key includes $arg_format so ?format=png and ?format=svg are
    # cached as distinct images at the same path (?source=qr lives inside the
    # encoded payload, not the URL, so it never affects the key).

    # Exact match for the bare list/create endpoint. WITHOUT this, the prefix
    # location below (which ends in "/") triggers nginx's automatic trailing-
    # slash 301: a request for "/api/links" is redirected to "/api/links/".
    # FastAPI's routes are slash-less (@router.get("/api/links")), so it then
    # 307s "/api/links/" back to "/api/links" -> an infinite redirect loop. The
    # exact match makes "/api/links" proxy straight through (200, no redirect).
    location = /api/links {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://api;
    }
    location ^~ /api/links/ {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        location ~ ^/api/links/[^/]+/qr$ {
            proxy_cache       qr_cache;
            proxy_cache_key   "$scheme$host$uri?format=$arg_format";
            proxy_cache_valid 200 1d;   # backstop; upstream max-age/immutable governs
            add_header        X-Cache-Status $upstream_cache_status always;

            # Headers do not inherit once redefined in a nested location.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://api;
        }

        proxy_pass http://api;
    }

    # === BLOCK 2: /health + /api/* (incl. /api/metrics) -> API ===============
    # `= /health` is exact so it never shadows a /healthxxx alias and beats both
    # /api/ and the / catch-all. The redirect service also exposes /health for
    # its own Docker healthcheck, but the PUBLIC /health is the API's per spec.
    location = /health {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://api;
    }
    location /api/ {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://api;
    }

    # === BLOCK 3: static assets -> files =====================================
    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    # SPA public/ files copied to dist root (e.g. tech-badge logos). Filenames are
    # NOT content-hashed (unlike /assets/), so cache for a day rather than immutable.
    location ^~ /images/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }
    location ^~ /static/ {
        try_files $uri =404;            # reserved for future static dir
    }
    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
    }
    location = /robots.txt {
        try_files $uri =404;
        access_log off;
    }

    # === BLOCK 4: known SPA routes -> index.html =============================
    # An enumerated, closed set — matched with =/^~ so they always outrank the
    # block-5 catch-all. /dashboard/:code (e.g. /dashboard/abc123) is a real
    # analytics route, so both /dashboard and /dashboard/* serve the SPA.
    location = / {
        try_files /index.html =404;
    }
    location = /dashboard {
        try_files /index.html =404;
    }
    location ^~ /dashboard/ {
        try_files /index.html =404;
    }
    location = /how-it-works {
        try_files /index.html =404;
    }

    # === BLOCK 5: fallback /{code} -> Redirect service =======================
    # Unknown short paths land here. Blocks 1-4 use =/^~ match types, which
    # always outrank this plain-prefix catch-all, so known routes never reach
    # the redirect service (and the SPA never 404s a hard refresh).
    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://redirect;
    }
}
