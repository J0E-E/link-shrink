# infra/nginx/nginx.conf — Epic 18b edge proxy (http-level).
#
# The public edge for the LinkShrink stack: TLS termination, the trusted
# client-IP contract, the QR edge cache, and the §5.10 routing precedence. The
# server blocks (routing, TLS, the reserved-word anti-drift checklist) live in
# conf.d/default.conf; this file holds only the http-level wiring those blocks
# build on (the real-IP policy, the proxy_cache zone, upstreams, and the log).

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # --- Real client IP (§5.9) -----------------------------------------------
    # Nginx IS the trust boundary here: it accepts connections directly from
    # untrusted clients, with no proxy in front. So we deliberately do NOT
    # recover the client from an inbound X-Forwarded-For — honoring a
    # client-supplied XFF would let anyone forge their IP past the rate limiter.
    # Instead $remote_addr is the genuine TCP peer, and each proxy location hands
    # the API a single, app-controlled X-Real-IP = $remote_addr. The API trusts
    # ONLY that header (REAL_IP_HEADER = "X-Real-IP" in
    # services/api/.../dependencies.py) and never parses a raw XFF, so the client
    # IP cannot be spoofed.
    #
    # PROD (behind a real LB/CDN): the true client then lives in the XFF the
    # trusted hop appends, so re-enable recovery scoped to that hop's egress
    # range — NEVER 0.0.0.0/0, which would trust (and thus let anyone spoof) any
    # peer's XFF:
    #     set_real_ip_from  <lb-or-cdn-cidr>;
    #     real_ip_header    X-Forwarded-For;
    #     real_ip_recursive on;
    # That rewrites $remote_addr to the recovered client before X-Real-IP is set.

    # $realip_remote_addr is the original TCP peer; with recovery off (local) it
    # equals $remote_addr, and with prod recovery on it proves the rewrite
    # happened. cache= lets the QR verification confirm edge HIT/MISS.
    log_format  main  '$remote_addr real=$realip_remote_addr "$request" '
                      '$status rt=$request_time cache=$upstream_cache_status';
    access_log  /var/log/nginx/access.log  main;

    # --- QR proxy_cache zone (Epic 9 / §5.10) --------------------------------
    # Backs the QR image cache used by the /api/links/{code}/qr location. We do
    # NOT proxy_ignore_headers Cache-Control, so the API's upstream header
    # (public, max-age=86400, immutable) governs freshness. The volume mounted at
    # /var/cache/nginx persists the cache across restarts.
    proxy_cache_path  /var/cache/nginx/qr  levels=1:2  keys_zone=qr_cache:10m
                      max_size=100m  inactive=7d  use_temp_path=off;

    # Internal-only service hosts (compose service names on the linkshrink network).
    upstream api      { server api:8000; }
    upstream redirect { server redirect:8001; }

    include /etc/nginx/conf.d/*.conf;
}
